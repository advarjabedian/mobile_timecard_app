services:
  - type: web
    name: punchclock-api
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py migrate --run-syncdb
    startCommand: gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.13.2"
